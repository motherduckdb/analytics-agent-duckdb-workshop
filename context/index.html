]\n  if skill:\n      messages.append({\"role\": \"system\", \"content\": skill})\n  messages.append({\"role\": \"user\", \"content\": question})\n  while True:\n      response = client.chat.completions.create(model=MODEL, tools=tools, messages=messages)\n      choice = response.choices[0]\n      if choice.message.content is None:\n          choice.message.content = \"\"\n      messages.append(choice.message)\n      if choice.finish_reason != \"tool_calls\":\n          return choice.message.content\n      for call in choice.message.tool_calls:\n          args = json.loads(call.function.arguments)\n          print(f\"  tool: {call.function.name}: {args.get('sql', '')[:70]}\")\n          result = run_tool(call.function.name, args)\n          messages.append({\"role\": \"tool\", \"tool_call_id\": call.id, \"content\": result})\n\nquestion = sys.argv[1] if len(sys.argv) \u003e 1 else \"What are the top 5 best-selling products?\"\nprint(ask(question))"])</script><script>self.__next_f.push([1,"9:[\"$\",\"$1\",\"c\",{\"children\":[[\"$\",\"$Le\",null,{\"title\":\"Part 3 — Context: Skill File + Semantic Context\",\"partId\":\"context\",\"children\":[[\"$\",\"h2\",null,{\"children\":\"What is Semantic Context?\"}],\"\\n\",[\"$\",\"p\",null,{\"children\":[\"The \",[\"$\",\"strong\",null,{\"children\":\"semantic layer\"}],\" — a single source of truth for metrics and definitions — is an appealing idea. But people, like water, follow the path of least resistance.\"]}],\"\\n\",[\"$\",\"p\",null,{\"children\":[\"\\\"Semantic\\\" is just a fancy word meaning there's a \",[\"$\",\"strong\",null,{\"children\":\"specific meaning\"}],\" for certain concepts and metrics in a company. Some are easy and stable; others live in people's heads and shift over time.\"]}],\"\\n\",[\"$\",\"p\",null,{\"children\":[\"The good news: \",[\"$\",\"strong\",null,{\"children\":\"LLMs are very good at pulling data from many sources.\"}],\" We can use the full \",[\"$\",\"em\",null,{\"children\":\"semant r value?\"}]\n1c:[\"$\",\"p\",null,{\"children\":[\"Now the agent should return \",[\"$\",\"strong\",null,{\"children\":\"169.90 euros\"}],\" (from \",[\"$\",\"code\",null,{\"children\":\"orders\"}],\") not ~17,000 (from \",[\"$\",\"code\",null,{\"children\":\"raw_orders\"}],\").\"]}]\n1d:[\"$\",\"$L3b\",null,{\"title\":\"Test the skill file\",\"minutes\":5,\"children\":[\"$\",\"p\",null,{\"children\":[\"Re-ask the traps from Part 2 with the skill file. Verify: \\\"Which venue has the highest revenue?\\\" should return \",[\"$\",\"strong\",null,{\"children\":\"Quack Quarter (1,109,769.82 EUR)\"}],\", not \\\"store_id 5 with 110M\\\". \\\"How many repeat customers?\\\" should now correctly use \",[\"$\",\"code\",null,{\"children\":\"'returning'\"}],\" (7,759).\"]}]}]\n1e:[\"$\",\"hr\",null,{}]\n1f:[\"$\",\"h2\",null,{\"children\":\"COMMENT ON — Meaning in the Database\"}]\n20:[\"$\",\"p\",null,{\"children\":[\"SQL \",[\"$\",\"code\",null,{\"children\":\"COMMENT O"])</script><script>self.__next_f.push([1,"N\"}],\" stores descriptions \",[\"$\",\"strong\",null,{\"children\":\"in the database itself\"}],\". Any tool that reads metadata discovers them.\"]}]\n3c:T9db,"])</script><script>self.__next_f.push([1,"duckdb duckoffee.duckdb \u003c\u003c 'SQL'\n-- Marts (source of truth)\nCOMMENT ON TABLE orders IS 'Clean orders mart. Amounts in EUROS. Pre-computed: is_food_order, count_food_items, includes_ticket. Use this, not raw_orders.';\nCOMMENT ON TABLE customers IS 'Customer mart. Pre-computed: lifetime_spend, count_lifetime_orders, first/last_order_at. customer_type is new or returning only.';\nCOMMENT ON TABLE order_items IS 'Line items with product_name, product_category, product_price, supply_cost. Join to orders on order_id.';\n\n-- Raw (traps)\nCOMMENT ON TABLE raw_orders IS 'Raw orders. Amounts in CENTS (divide by 100). Column \"customer\" = customer_id, \"store_id\" = location_id.';\nCOMMENT ON TABLE raw_items IS 'Raw line items. Uses \"sku\" not \"product_id\".';\nCOMMENT ON TABLE raw_supplies IS 'Raw supplies. Uses \"perishable\" not \"is_perishable_supply\".';\nCOMMENT ON TABLE raw_legacy_invoices IS 'SAP-style columns: AMTTTL (cents), STSCODE (C/X/P = completed/cancelled/pending), CSTCODE, LOCCODE, DISCPCT. Use stg_legacy_invoices instead.';\n\n-- Dead-ends\nCOMMENT ON TABLE daily_revenue IS 'STALE. Only 5 of 20 locations (Pond Stage, Feather \u0026 Bean, Quack Quarter, Mallard Manor, Duck Yard). No data after 2025-12-31. Use orders instead.';\nCOMMENT ON TABLE customer_segments IS 'INCOMPLETE. Only 6k of 12k customers. Labels (vip/regular/casual) are unreliable. Derive from customers mart.';\nCOMMENT ON TABLE order_facts IS 'AMBIGUOUS. Column \"total\" is actually subtotal, not order_total. Missing recent orders. Use orders instead.';\n\n-- Key columns\nCOMMENT ON COLUMN orders.order_total IS 'Total in EUROS (subtotal + tax_paid). Use this for revenue. Identity: order_total = subtotal + tax_paid.';\nCOMMENT ON COLUMN orders.is_food_order IS 'Pre-computed: TRUE if all items are Food category. 52,803 food-only orders.';\nCOMMENT ON COLUMN orders.includes_ticket IS 'Pre-computed: TRUE if any item is a Ticket. 33.69% of orders.';\nCOMMENT ON COLUMN orders.count_food_items IS 'Pre-computed count of food items in this order.';\nCOMMENT ON COLUMN customers.customer_type IS 'Only two values: new, returning. No repeat/existing/VIP.';\nCOMMENT ON COLUMN customers.lifetime_spend IS 'Pre-computed total spend in EUROS. No need to SUM from orders.';\nCOMMENT ON COLUMN raw_orders.order_total IS 'WARNING: stored in CENTS not euros. Divide by 100.';\nCOMMENT ON COLUMN raw_orders.customer IS 'This is customer_id. Column lacks the _id suffix.';\nCOMMENT ON COLUMN raw_orders.store_id IS 'This is location_id. Name differs from orders table.';\nSQL"])</script><script>self.__next_f.push([1,"21:[\"$\",\"$L10\",null,{\"label\":\"Add comments to key tables\",\"text\":\"$3c\"}]\n22:[\"$\",\"hr\",null,{}]\n23:[\"$\",\"h2\",null,{\"children\":\"Why COMMENT ON?\"}]\n24:[\"$\",\"ul\",null,{\"children\":[\"\\n\",[\"$\",\"li\",null,{\"children\":[[\"$\",\"strong\",null,{\"children\":\"Zero infrastructure\"}],\" — just SQL, stored in the \",[\"$\",\"code\",null,{\"children\":\".duckdb\"}],\" file\"]}],\"\\n\",[\"$\",\"li\",null,{\"children\":[[\"$\",\"strong\",null,{\"children\":\"Portable\"}],\" — share the file, share the context\"]}],\"\\n\",[\"$\",\"li\",null,{\"children\":[[\"$\",\"strong\",null,{\"children\":\"Discoverable\"}],\" — any tool reading \",[\"$\",\"code\",null,{\"children\":\"duckdb_columns()\"}],\" gets them\"]}],\"\\n\",[\"$\",\"li\",null,{\"children\":[[\"$\",\"strong\",null,{\"children\":\"Prevents traps\"}],\" — mark dead-end tables with warnings\"]}],\"\\n\"]}]\n25:[\"$\",\"hr\",null,{}]\n26:[\"$\",\"h2\",null,{\"children\":\"Test It\"}]\n27:[\"$\",\"p\",null,{\"children\":\"Verify comments are stored:\"}]\n28:[\"$\",\"$L10\",null,{\"label\":\"Check comments\",\"text\":\"duckdb duckoffee.duckdb -c \\\"\\nSELECT table_name, left(comment, 80) AS comment\\nFROM duckdb_tables()\\nWHERE comment IS NOT NULL\\nORDER BY table_name;\\n\\\"\"}]\n29:[\"$\",\"p\",null,{\"children\":\"Now re-ask the agent with both layers:\"}]\n2a:[\"$\",\"$L10\",null,{\"label\":\"Prompt with skill + comments\",\"text\":\"Read skill.md for business rules.\\nAlso check database comments:\\nduckdb duckoffee.duckdb -c \\\"SELECT table_name, comment FROM duckdb_tables() WHERE comment IS NOT NULL\\\"\\n\\nNow answer: What's the daily revenue trend for the last 3 months?\"}]\n2b:[\"$\",\"div\",null,{\"style\":{\"marginTop\":18,\"marginBottom\":18,\"padding\":\"14px 18px\",\"background\":\"#6FC2FF12\",\"borderLeft\":\"3px solid #6FC2FF\",\"borderRadius\":\"0 8px 8px 0\",\"fontSize\":16,\"color\":\"#383838\",\"lineHeight\":1.5,\"fontFamily\":\"'Inter', system-ui, sans-serif\"},\"children\":\"Without context, the agent would use daily_revenue (stale, 5 venues). With context, it computes from orders (all 20 venues, up to date). Daily revenue should be ~21,000-30,000 euros per day in early 2026.\"}]\n2c:[\"$\",\"$L3b\",null,{\"title\":\"Test dead-end traps\",\"minutes\":5,\"children\":[\"$\",\"p\",null,{\"children\":\"Try these with both skill + COMMENT ON: \\\"Compare revenue across all 20 venues\\\" (T02) — should show all 20, not just 5. \\\"What's the breakdown of customer segments?\\\" (T04) — should derive from customers mart, not the incomplete customer_segments table.\"}]}]\n2d:[\"$\",\"hr\",null,{}]\n2e:[\"$\",\"h2\",null,{\"children\":\"Where This Falls Short\"}]\n2f:[\"$\",\"p\",null,{\"children\":\"Ask the same revenue question twice. Compare the SQL. It's different each time.\"}]\n30:[\"$\",\"p\",null,{\"children\":[\"For a \",[\"$\",\"strong\",null,{\"children\":\"board deck\"}],\" or \",[\"$\",\"strong\",null,{\"children\":\"financial report\"}],\", you need the exact same SQL every time. That's what \",[\"$\",\"strong\",null,{\"children\":\"tools\"}],\" give you — code that always produces the same result.\"]}]\n31:[\"$\",\"$L3d\",null,{\"question\":\"Why is daily_revenue a 'dead-end' table?\",\"options\":[\"It has wrong data types\",\"It only covers 5 of 20 locations and stops at 2025-12-31\",\"It's empty\"],\"correct\":1,\"explanation\":\"daily_revenue is stale: it only has data for 5 of 20 venues (The Pond Stage, Feather \u0026 Bean, Quack Quarter, Mallard Manor, and The Duck Yard), and has no rows after 2025-12-31. Always compute revenue from the orders table instead.\"}]\n32:[\"$\",\"script\",\"script-0\",{\"src\":\"/analytics-agent-duckdb-workshop/_next/static/chunks/0cdkxk72h8tgb.js\",\"async\":true,\"nonce\":\"$undefined\"}]\n33:[\"$\",\"script\",\"script-1\",{\"src\":\"/analytics-agent-duckdb-workshop/_next/static/chunks/0aqyu~37yq6py.js\",\"async\":true,\"nonce\":\"$undefined\"}]\n34:[\"$\",\"$L3e\",null,{\"children\":[\"$\",\"$39\",null,{\"name\":\"Next.MetadataOutlet\",\"children\":\"$@3f\"}]}]\n"])</script><script>self.__next_f.push([1,"37:[[\"$\",\"meta\",\"0\",{
